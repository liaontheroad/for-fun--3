<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>You got it right! 🎁</title><link rel="stylesheet" href="style.css"/></head>
<body>
  <div class="balloons"><span class="balloon" style="--x:8%;--delay:0s">🎈</span><span class="balloon" style="--x:80%;--delay:2s">🎈</span><span class="balloon" style="--x:45%;--delay:3.5s">🎈</span></div>
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="sparkles"><span class="sparkle" style="top:8%;left:8%;--d:0s">✦</span><span class="sparkle" style="top:12%;right:10%;--d:.6s">✦</span><span class="sparkle" style="bottom:16%;right:6%;--d:1.2s">✦</span></div>
  <main>
    <h1>You got it right! 🎁</h1>
    <p class="subtitle">Ada sesuatu yang spesial buat kamu...</p>
    <div class="gift-wrap">
      <svg id="giftClosed" class="gift-svg" viewBox="0 0 200 200" fill="none">
        <rect x="40" y="90" width="120" height="90" rx="8" fill="#FFB6D9"/>
        <rect x="40" y="74" width="120" height="22" rx="5" fill="#FF8DC7"/>
        <rect x="93" y="74" width="14" height="106" fill="#FF69B4"/>
        <rect x="40" y="118" width="120" height="14" fill="#FF69B4"/>
        <ellipse cx="78" cy="60" rx="20" ry="14" fill="#FF1493" transform="rotate(-20 78 60)"/>
        <ellipse cx="122" cy="60" rx="20" ry="14" fill="#FF1493" transform="rotate(20 122 60)"/>
        <circle cx="100" cy="63" r="10" fill="#FFB6D9"/><circle cx="100" cy="63" r="5" fill="#FF69B4"/>
        <text x="52" y="115" font-size="13" fill="white" opacity="0.7">✦</text>
        <text x="128" y="155" font-size="11" fill="white" opacity="0.6">✦</text>
      </svg>
      <svg id="giftOpen" class="gift-svg hidden" viewBox="0 0 200 200" fill="none">
        <rect x="40" y="120" width="120" height="60" rx="8" fill="#FFB6D9"/>
        <rect x="93" y="120" width="14" height="60" fill="#FF69B4"/>
        <rect x="40" y="140" width="120" height="14" fill="#FF69B4"/>
        <rect x="32" y="88" width="136" height="28" rx="6" fill="#FF8DC7" transform="rotate(-28 32 88)"/>
        <text x="80" y="82" font-size="24">💖</text><text x="48" y="60" font-size="18">✨</text>
        <text x="128" y="65" font-size="20">🌸</text><text x="68" y="42" font-size="16">⭐</text><text x="112" y="36" font-size="18">💫</text>
      </svg>
    </div>
    <button id="openBtn" class="btn-primary">🎀 Buka kadonya</button>
    <div id="revealMsg" class="reveal-msg hidden">
      <p>✨ Di dalam kado ini ada sesuatu yang lebih berharga dari apapun — sebuah surat kecil yang ditulis dengan sepenuh hati, khusus untuk kamu 💌</p>
      <a href="../3-letter/index.html" class="btn-primary">Buka suratnya 💌</a>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
